        <style>
            *,

                box-sizing: border-box;

            :root {

            .toast.show {

            .toast.success {

    <body>
        <main>
            <h1>Gimmick Login</h1>
            <p class="subtitle">Sign in to your Gimkit credentials. You'll be able to access your cosmetics, but won't
                be able to start games or edit sets.</p>

            <div class="form">
                <input placeholder="username or email" id="username" type="text" autocomplete="username" />
                <input placeholder="password" id="password" type="password" autocomplete="current-password" />
                <button>Continue</button>
            </div>

            <p class="hint">
                Google Accounts don't work - create a password at
                <a href="https://gimkit.com/settings" target="_blank">gimkit.com/settings</a>
            </p>

            <p id="auth" class="hint">You aren't currently signed in.</p>
        </main>

        <div class="toast" id="toast"></div>

        <script>
            const btn = document.querySelector('button');
            const toast = document.querySelector('#toast');
            let toastTimer;

            const showToast = (msg, type = 'success') => {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = `toast ${type}`;
                requestAnimationFrame(() => toast.classList.add('show'));
                toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
            }

            btn.addEventListener('click', async () => {
                const email = document.querySelector('#username').value.trim();
                const password = document.querySelector('#password').value;

                if (!email || !password) return showToast('Please fill in both fields.', 'error');

                btn.disabled = true;
                btn.textContent = 'Signing in...';

                try {
                    const res = await fetch('/login/post', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (data.error) showToast('Error: ' + data.error, 'error');
                    else if (data.success) {
                        showToast('Signed in!', 'success');
                        setTimeout(() => window.location.href = '/', 1000);
                    } else showToast('Unexpected response from server.', 'error');
                } catch (e) {
                    showToast('Something went wrong.', 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Continue';
                }
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Enter') btn.click();
            });

            fetch('/login/whoami').then(res => res.json()).then(data => {
                if (data.email) {
                    document.querySelector('#auth').innerHTML = `Signed in as ${data.email} - <span id="logout">logout</span>`;
                    document.querySelector('#logout').addEventListener('click', () => {
                        fetch('/login/logout', { method: 'POST' }).then(() => {
                            showToast('Logged out.', 'success');
                            setTimeout(() => window.location.reload(), 1000);
                        }).catch(() => showToast('Something went wrong.', 'error'));
                    });
                }
            });
        </script>
